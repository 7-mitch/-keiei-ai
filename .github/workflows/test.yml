name: Test KEIEI-AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== バックエンドテスト =====
  test-backend:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 依存関係インストール
        run: |
          pip install pyflakes pydantic pydantic-settings python-jose bcrypt

      - name: 型チェック（pyflakes）
        run: |
          python -m pyflakes backend/app/core/llm_factory.py
          python -m pyflakes backend/app/core/security.py

  # ===== フロントエンドテスト =====
  test-frontend:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存関係インストール
        run: cd frontend && npm ci

      - name: ESLint チェック
        run: cd frontend && npm run lint
name: Test KEIEI-AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 型チェック
        run: |
          pip install pyflakes
          python -m pyflakes backend/app/core/llm_factory.py
          python -m pyflakes backend/app/core/security.py
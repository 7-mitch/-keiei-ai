services:

  backend:
    build: ./backend
    container_name: keiei-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/docs_data:/app/docs_data
      - ./backend/vector_store:/app/vector_store
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: keiei-ai-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
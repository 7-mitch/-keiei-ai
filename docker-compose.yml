services:

  # ===== PostgreSQL =====
  db:
    image: postgres:15-alpine
    container_name: keiei-ai-db
    environment:
      POSTGRES_USER:     keiei
      POSTGRES_PASSWORD: keiei_pass
      POSTGRES_DB:       keiei_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keiei"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Ollama（ローカルLLM）=====
  ollama:
    image: ollama/ollama:latest
    container_name: keiei-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ===== バックエンド =====
  backend:
    build: ./backend
    container_name: keiei-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://keiei:keiei_pass@db:5432/keiei_ai
      - ENVIRONMENT=development
    volumes:
      - ./backend/docs_data:/app/docs_data
      - ./backend/vector_store:/app/vector_store
      - ./backend/docs_ingest:/app/docs_ingest
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # ===== フロントエンド =====
  frontend:
    build: ./frontend
    container_name: keiei-ai-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data: